<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Charts - Click to View Forecast</title>
    
    <!-- Highcharts -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        nav {
            background: #2c3e50;
            padding: 1rem;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #3498db;
        }
        .instruction-overlay {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 1.1rem;
            font-weight: bold;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .instruction-overlay {
                font-size: 0.9rem;
                padding: 8px 15px;
                top: 60px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html">Home</a>
        <a href="../education.html">Education</a>
        <a href="../experience.html">Skills</a>
        <a href="../publications.html">Publications</a>
        <a href="../contact.html">Contact</a>
        <a href="../nwp_imd.html">NWP_IMD</a>
        <a href="weatherchart.html">Weather Chart</a>
        <a href="../Jobs.html">Jobs</a>
        <a href="https://www.tropmet.res.in/Careers">IITM Career</a>
        <a href="https://vacancies.incois.gov.in/">INCOIS Career</a>
        <a href="../movies.html">Movies</a>
        <a href="../series.html">Series</a>
    </nav>

    <div id="map"></div>


    <script>
        // Prevent right-click & devtools shortcuts (optional - remove if not needed)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        };

        // Map setup
        const map = L.map('map', {
            minZoom: 4,
            maxZoom: 10,
            maxBounds: [[-10, 60], [40, 100]],
            maxBoundsViscosity: 1.0
        }).setView([20, 78], 5);  // Centered on India

        // Base layers
        const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0','mt1','mt2','mt3'],
            attribution: '© Google'
        });

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        googleHybrid.addTo(map);

        // Overlays from NASA GIBS (example - add more as needed)
        const overlays = {
            'MODIS True Color': L.tileLayer('https://map1.vis.earthdata.nasa.gov/wmts-webmerc/MODIS_Terra_CorrectedReflectance_TrueColor/default/{time}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg', {
                time: '2024-03-01',  // Update dynamically if needed
                attribution: 'NASA GIBS'
            }),
            'IMERG Precipitation': L.tileLayer('https://map1.vis.earthdata.nasa.gov/wmts-webmerc/IMERG_Precipitation_Rate/default/{time}/GoogleMapsCompatible_Level6/{z}/{y}/{x}.png', {
                time: '2024-03-01',
                attribution: 'NASA GIBS'
            })
        };

        L.control.layers({
            'Google Hybrid': googleHybrid,
            'OpenStreetMap': osm
        }, overlays).addTo(map);

        let markers = [];

        function findNearestIndex(value, array) {
            let nearest = 0;
            let minDiff = Math.abs(value - array[0]);
            for (let i = 1; i < array.length; i++) {
                const diff = Math.abs(value - array[i]);
                if (diff < minDiff) {
                    minDiff = diff;
                    nearest = i;
                }
            }
            return (minDiff <= 5) ? nearest : null;
        }

        async function fetchData(url, targetLat, targetLon, field) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Fetch failed: ${url}`);
                const data = await res.json();
                const latIdx = findNearestIndex(targetLat, data.coords.latitude.data);
                const lonIdx = findNearestIndex(targetLon, data.coords.longitude.data);
                if (latIdx === null || lonIdx === null) return null;

                return data.data.map(row => row[latIdx][lonIdx]);
            } catch (err) {
                console.error(`Error fetching ${field}:`, err);
                return null;
            }
        }

        function createWeatherChart(containerId, lat, lon) {
            Promise.all([
                fetchData('2m_temp.json', lat, lon, 'temperature').then(d => d ? d.map(v => (v - 273.15).toFixed(1)) : null),
                fetchData('rf.json', lat, lon, 'rainfall').then(d => d ? d.map(v => v.toFixed(1)) : null),
                fetchData('msl.json', lat, lon, 'mslp').then(d => d ? d.map(v => v.toFixed(1)) : null)
            ]).then(([temps, rain, mslp]) => {
                if (!temps || !rain || !mslp) {
                    document.getElementById(containerId).innerHTML = '<p style="color:red;">Data not available for this location.</p>';
                    return;
                }

                // Assume time from temp file (adjust if needed)
                const timeLabels = temps.map((_, i) => `Step ${i+1}`); // Replace with real time if available

                Highcharts.chart(containerId, {
                    chart: { type: 'line', height: 400 },
                    title: { text: `Forecast at Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}` },
                    xAxis: { categories: timeLabels, title: { text: 'Forecast Time' } },
                    yAxis: [
                        { title: { text: 'Temperature (°C)', style: { color: '#e74c3c' } }, labels: { style: { color: '#e74c3c' } } },
                        { title: { text: 'MSLP (hPa)', style: { color: '#3498db' } }, opposite: true, labels: { style: { color: '#3498db' } } },
                        { title: { text: 'Rainfall (mm/3h)', style: { color: '#27ae60' } }, opposite: false, labels: { style: { color: '#27ae60' } } }
                    ],
                    series: [
                        { name: 'Temperature', data: temps.map(Number), color: '#e74c3c', yAxis: 0, marker: { enabled: false } },
                        { name: 'MSLP', data: mslp.map(Number), color: '#3498db', yAxis: 1, dashStyle: 'ShortDash', marker: { enabled: false } },
                        { name: 'Rainfall', data: rain.map(Number), color: '#27ae60', type: 'column', yAxis: 2 }
                    ],
                    tooltip: { shared: true },
                    legend: { enabled: true },
                    credits: { enabled: false },
                    subtitle: { text: 'Non-official forecast – Informational only' }
                });
            });
        }

        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(2);
            const lon = e.latlng.lng.toFixed(2);

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            const marker = L.marker([lat, lon]).addTo(map);
            markers.push(marker);

            const containerId = 'chart-' + Date.now();

            const popupContent = `
                <div style="min-width: 800px; max-height: 500px; overflow-y: auto; padding: 10px;">
                    <h3 style="margin-top:0;">Forecast at ${lat}, ${lon}</h3>
                    <div id="${containerId}" style="width:100%; height:420px;"></div>
                </div>`;

            marker.bindPopup(popupContent, { maxWidth: 900 }).openPopup();

            // Wait for popup to render
            setTimeout(() => {
                const container = document.getElementById(containerId);
                if (container) {
                    createWeatherChart(containerId, lat, lon);
                } else {
                    console.warn("Chart container not found in popup");
                }
            }, 400);  // Increased delay for reliability
        });
    </script>
</body>
</html>
