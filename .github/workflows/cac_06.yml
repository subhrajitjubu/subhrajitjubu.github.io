name: Download and preprocess 06UTC

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate

          python -m pip install --upgrade pip
          pip install jupyter nbconvert ipython
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config --global user.name "subhrajitjubu"
          git config --global user.email "66462700+subhrajitjubu@users.noreply.github.com"

      - name: Clean previous JSON files
        run: |
          find src/ -type f -name "*.json" ! -name "IND.json" -delete

      - name: Run notebook
        run: |
          source venv/bin/activate

          jupyter nbconvert \
            --to notebook \
            --execute src/singlelevel_06.ipynb \
            --inplace

      - name: Cleanup temporary files
        run: |
          rm -f atms.grib2*

      - name: Move generated JSON files
        run: |
          find . -maxdepth 1 -type f -name "*.json" -exec mv {} src/ \;

      - name: Compress JSON files
        run: |
          JSON_FILES=$(find src/ -maxdepth 1 -type f -name "*.json" ! -name "IND.json")

          if [ -n "$JSON_FILES" ]; then
            tar -czf json_files.tar.gz $JSON_FILES

            find src/ -maxdepth 1 -type f -name "*.json" ! -name "IND.json" -delete
          else
            echo "No JSON files found"
          fi

      - name: Commit and push
        run: |
          git add json_files.tar.gz

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update compressed JSON files - $(date -u)"
            git push
          else
            echo "No changes to commit"
          fi
