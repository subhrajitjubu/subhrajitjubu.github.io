name: Download and preprocess 00UTC

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure git
        run: |
          git config --global user.name "subhrajitjubu"
          git config --global user.email "66462700+subhrajitjubu@users.noreply.github.com"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert
          pip install -r requirements.txt

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Run Jupyter Notebook
        run: |
          find src/ -type f -name "*.json" ! -name "IND.json" -exec rm {} \;

          jupyter nbconvert \
            --to notebook \
            --execute src/singlelevel_00.ipynb \
            --output /tmp/singlelevel_00_executed.ipynb \
            --ExecutePreprocessor.timeout=600

          rm -f atms.grib2*

          find . -maxdepth 1 -name "*.json" ! -name "IND.json" -exec mv {} src/ \;

      - name: Commit and push JSON files
        run: |
          git add src/*.json

          git pull --rebase origin main

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update JSON files - $(date -u '+%Y-%m-%d %H:%M UTC')"

            for i in 1 2 3; do
              git push origin main && break
              echo "Push attempt $i failed, retrying..."
              git pull --rebase origin main
              sleep 5
            done
          else
            echo "No changes to commit."
          fi
